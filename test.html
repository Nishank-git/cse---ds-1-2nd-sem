<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>p-diddy restaurant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
        }

        header {
            background-color:#8B0000;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        section {
            padding: 40px;
            text-align: center;
        }

        .menu-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .menu-card {
            background: white;
            padding: 20px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
        }

        button {
            background-color: #8B0000;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #a30000;
        }

        form {
            background: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>🍽 p - diddy restuarant</h1>
    <p>Fresh Food | Tasty Drinks | Sweet Cakes</p>
</header>

<nav>
    <a href="#menu">Menu</a>
    <a href="#reservation">Reservation</a>
</nav>

<section id="menu">
    <h2>Our Menu</h2>

    <div class="menu-container">
        <div class="menu-card">
            <h3>🍔 Food</h3>
            <img src = "https://tse4.mm.bing.net/th/id/OIP.paZokRr6HFdXZQoIAKmDjgHaEK?cb=defcachec2&rs=1&pid=ImgDetMain&o=7&rm=3" height = "150px" width = "150px">
            <p>Burger</p>
            <p>Pizza</p>
            <p>Pasta</p>
            <button>Order Now</button>
        </div>

        <div class="menu-card">
            <h3>🥤 Drinks</h3>
            <img src = "https://th.bing.com/th/id/OIP.-By0Y5chePR9J0LiXb18yQHaEJ?w=308&h=180&c=7&r=0&o=7&cb=defcachec2&dpr=1.3&pid=1.7&rm=3" height = "150px" width = "150px">
            <p>Fresh Juice</p>
            <p>Cold Coffee</p>
            <p>Mocktails</p>
            <button>Order Now</button>
        </div>

        <div class="menu-card">
            <h3>🎂 Cakes</h3>
            <img src = "https://tse1.mm.bing.net/th/id/OIP.YpBQ3jIffNpseSrxu6UN2AHaGP?cb=defcachec2&rs=1&pid=ImgDetMain&o=7&rm=3" height = "150px" width = "150px">
            <p>Chocolate Cake</p>
            <p>Vanilla Cake</p>
            <p>Red Velvet</p>
            <button>Order Now</button>
        </div>
    </div>
</section>

<section id="reservation">
    <h2>Book a Table</h2>

    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <input type="date" required>
        <input type="time" required>
        <input type="number" placeholder="Number of Guests" required>
        <button type="submit">Reserve Now</button>
    </form>
</section>

<footer>
    <p>© 2026 Delicious Bites Restaurant | All Rights Reserved</p>
</footer>

</body>
</html>
